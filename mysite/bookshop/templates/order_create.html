{% extends "base.html" %}
{% load i18n %} {% block content %}

<form method="post">
    {% csrf_token %}
    <input name="first_name" placeholder="{% trans 'Ім\'я' %}" required>
    <input name="last_name" placeholder="{% trans 'Прізвище' %}" required>
    <input name="email" type="email" placeholder="{% trans 'Email' %}" required>
    <input name="address" placeholder="{% trans 'Адреса' %}" required>
    <button type="submit">{% trans "Замовити" %}</button>
</form>

{% endblock %}
