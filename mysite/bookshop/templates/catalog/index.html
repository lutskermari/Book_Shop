<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Мій Книжковий Магазин</h1>
    
    <ul>
        {% for book in books %}
            <li>
                <strong>{{ book.title }}</strong> — {{ book.author }} <br>
                Ціна: {{ book.price }} грн. <br>
                <p>{{ book.description }}</p>
                <hr>
            </li>
        {% empty %}
            <li>Книг поки немає в базі.</li>
        {% endfor %}
    </ul>
</body>
</html>
