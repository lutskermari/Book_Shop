<!DOCTYPE html>
<html>
<head>
    <title>Категорії книг</title>
</head>
<body>
    <h1>Категорії з дорогими книгами</h1>
    <a href="{% url 'index' %}">Повернутися до всіх книг</a>
    <hr>
    <ul>
        {% for category in categories %}
            <li>
                <strong>{{ category.name }}</strong> 
                — Кількість книг дорожче 300 грн: {{ category.books_count }}
            </li>
        {% endfor %}
    </ul>
</body>
</html>
