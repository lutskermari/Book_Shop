{% extends 'base.html' %}

{% block title %}Книга{% endblock %}

{% block content %}
    <h2>
        {% if object %}
            Редагування книги: {{ object.title }}
        {% else %}
            Додавання нової книги
        {% endif %}
    </h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button>Зберегти книгу</button>
    </form>
{% endblock content%}
